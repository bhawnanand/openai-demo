<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShopScript Tests</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { padding: 24px; }
    .test-shell { max-width: 900px; margin: 0 auto; }
    .test-row { border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-bottom: 10px; background: white; }
    .pass { border-left: 6px solid var(--accent); }
    .fail { border-left: 6px solid var(--rose); }
    pre { overflow: auto; padding: 12px; background: #16202d; color: white; border-radius: 8px; }
  </style>
</head>
<body>
  <main class="test-shell">
    <p class="eyebrow">ShopScript</p>
    <h1>Browser tests</h1>
    <p class="lead">These tests run without npm, a dev server, or external dependencies.</p>
    <div id="results"></div>
    <p><a href="index.html">Back to app</a></p>
  </main>
  <script src="storage.js"></script>
  <script src="codexClient.js"></script>
  <script src="tests.js"></script>
</body>
</html>
